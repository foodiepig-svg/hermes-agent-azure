name: Deploy Hermes to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Docker image
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image hermes-agent:latest \
            --file Dockerfile .

      - name: Deploy to Container Apps
        run: |
          az containerapp create \
            --name hermes-agent \
            --resource-group hermes-rg \
            --environment ludolabs-env \
            --ingress external \
            --target-port 8000 \
            --transport auto \
            --revisions-mode single \
            --min-replicas 1 \
            --max-replicas 1 \
            --image ${{ vars.ACR_NAME }}.azurecr.io/hermes-agent:latest \
            --registry-username ${{ vars.ACR_NAME }} \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --set-env-vars \
              "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" \
              "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
              "AZURE_LUDOLABS_KEY=${{ secrets.AZURE_LUDOLABS_KEY }}" \
            2>&1 || echo "Container app may already exist — trying update"

      - name: Update Container App (idempotent)
        run: |
          az containerapp update \
            --name hermes-agent \
            --resource-group hermes-rg \
            --image ${{ vars.ACR_NAME }}.azurecr.io/hermes-agent:latest \
            --set-env-vars \
              "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" \
              "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
              "AZURE_LUDOLABS_KEY=${{ secrets.AZURE_LUDOLABS_KEY }}"
