name: Deploy Hermes to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ludolabsregistry.azurecr.io
          username: ludolabsregistry
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ludolabsregistry.azurecr.io/hermes-agent:latest

      - name: Deploy to Container Apps
        run: |
          APP_EXISTS=$(az containerapp show --name hermes-agent --resource-group hermes-rg --query 'name' -o tsv 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$APP_EXISTS" = "NOT_FOUND" ]; then
            echo "Creating hermes-agent Container App..."
            az containerapp create \
              --name hermes-agent \
              --resource-group hermes-rg \
              --environment ludolabs-env \
              --ingress external \
              --target-port 8000 \
              --transport auto \
              --revisions-mode single \
              --min-replicas 1 \
              --max-replicas 1 \
              --image ludolabsregistry.azurecr.io/hermes-agent:latest \
              --registry-username ludolabsregistry \
              --registry-password "${{ secrets.ACR_PASSWORD }}" \
              --set-env-vars \
                MINIMAX_API_KEY="${{ secrets.MINIMAX_API_KEY }}" \
                TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
                AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
                AZURE_OPENAI_DEPLOYMENT="${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
                AZURE_LUDOLABS_KEY="${{ secrets.AZURE_LUDOLABS_KEY }}"
          else
            echo "Updating existing hermes-agent Container App..."
            az containerapp update \
              --name hermes-agent \
              --resource-group hermes-rg \
              --image ludolabsregistry.azurecr.io/hermes-agent:latest \
              --set-env-vars \
                MINIMAX_API_KEY="${{ secrets.MINIMAX_API_KEY }}" \
                TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
                AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
                AZURE_OPENAI_DEPLOYMENT="${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
                AZURE_LUDOLABS_KEY="${{ secrets.AZURE_LUDOLABS_KEY }}"
          fi
