name: Deploy Hermes to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: 91bd0fcb-95b8-4a45-b69e-f9556190dd29

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ludolabsregistry.azurecr.io
          username: ludolabsregistry
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ludolabsregistry.azurecr.io/hermes-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Container Apps
        run: |
          set -e
          
          APP_EXISTS=$(az containerapp show \
            --name hermes-agent \
            --resource-group hermes-rg \
            --query 'name' \
            -o tsv 2>/dev/null || echo "NOT_FOUND")
          
          ENV_VARS="MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}"
          ENV_VARS="$ENV_VARS TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
          ENV_VARS="$ENV_VARS TELEGRAM_ALLOWED_USERS=222335742"
          ENV_VARS="$ENV_VARS AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}"
          ENV_VARS="$ENV_VARS AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}"
          ENV_VARS="$ENV_VARS AZURE_LUDOLABS_KEY=${{ secrets.AZURE_LUDOLABS_KEY }}"
          
          if [ "$APP_EXISTS" = "NOT_FOUND" ]; then
            echo "Creating hermes-agent Container App..."
            az containerapp create \
              --name hermes-agent \
              --resource-group hermes-rg \
              --environment ludolabs-env \
              --ingress external \
              --target-port 8000 \
              --transport auto \
              --revisions-mode single \
              --min-replicas 1 \
              --max-replicas 1 \
              --image ludolabsregistry.azurecr.io/hermes-agent:latest \
              --registry-server ludolabsregistry.azurecr.io \
              --registry-username ludolabsregistry \
              --registry-password "${{ secrets.ACR_PASSWORD }}" \
              --env-vars "$ENV_VARS"
          else
            echo "Updating existing hermes-agent Container App..."
            az containerapp update \
              --name hermes-agent \
              --resource-group hermes-rg \
              --image ludolabsregistry.azurecr.io/hermes-agent:latest \
              --env-vars "$ENV_VARS"
          fi