model:
  default: MiniMax-M2.7
  provider: minimax
  base_url: https://api.minimax.io/anthropic
  api_key: ${MINIMAX_API_KEY}
  context_length: 100000

# Smart routing: auto-fallback to free Groq model when primary hits rate limits
smart_model_routing:
  enabled: true
  cheap_model: groq/llama-3.3-70b-versatile

agent:
  max_turns: 90

terminal:
  backend: local
  timeout: 180

# Toolsets — enabled at startup
# Use /tools in Telegram to manage, or set below
tools:
  enabled:
    - web
    - browser
    - terminal
    - file
    - code_execution
    - vision
    - image_gen
    - tts
    - skills
    - memory
    - session_search
    - delegation
    - cronjob
    - clarify
    - messaging
    - search
    - todo
    - homeassistant

gateway:
  platforms:
    - telegram
    - api_server
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}
  api_server:
    enabled: true
    host: "0.0.0.0"
    port: 8000
